name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Format check
        run: mise run fmt:check
      - name: Lint
        run: mise run lint

  test:
    runs-on: macos-26
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Test
        run: mise run test
